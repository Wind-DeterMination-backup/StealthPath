name: Release (Main Builds)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must start with v, e.g. v5.2.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools (for d8)
        run: sdkmanager "build-tools;34.0.0"

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean jar jarAndroid

      - name: Compute tag
        id: vars
        shell: bash
        run: |
          tag=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$tag" || ! "$tag" =~ ^v ]]; then
            echo "Invalid tag: '$tag' (must start with v, e.g. v5.2.1)"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=Release $tag" >> "$GITHUB_OUTPUT"

      - name: Create new release (no overwrite)
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          allowUpdates: false
          bodyFile: RELEASE_NOTES.md
          artifacts: dist/stealth-path.zip,dist/stealth-path-android.jar
